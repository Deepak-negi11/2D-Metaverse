<!doctype html>
<html>
<head><meta charset="utf-8"><title>Loft logo concepts</title>
<style>
  body{background:#0A0A0F;color:#ECECF5;font-family:system-ui;margin:0;padding:40px;}
  h1{font-weight:600;letter-spacing:.04em}
  .grid{display:flex;gap:40px;flex-wrap:wrap;margin-top:30px}
  .card{background:#14141C;border:1px solid #26263A;border-radius:16px;padding:28px;text-align:center}
  .row{display:flex;align-items:center;gap:16px;justify-content:center;margin-bottom:18px}
  .name{font-size:13px;color:#8A8AA3;margin-top:8px}
  .sizes{display:flex;gap:14px;align-items:center;justify-content:center;margin-top:14px}
  .lockup{display:flex;align-items:center;gap:12px;font-size:26px;font-weight:700}
</style></head>
<body>
  <h1>loft — logo concepts</h1>
  <div class="grid">

    <!-- A: L carved from a rounded tile + avatar dot -->
    <div class="card">
      <svg width="80" height="80" viewBox="0 0 64 64" fill="none">
        <rect x="6" y="6" width="52" height="52" rx="14" fill="#6E56F8"/>
        <path d="M24 18H32V40H46V48H24V18Z" fill="#0A0A0F"/>
        <circle cx="41" cy="25" r="4.5" fill="#A78BFA"/>
      </svg>
      <div class="sizes">
        <svg width="32" height="32" viewBox="0 0 64 64"><rect x="6" y="6" width="52" height="52" rx="14" fill="#6E56F8"/><path d="M24 18H32V40H46V48H24V18Z" fill="#0A0A0F"/><circle cx="41" cy="25" r="4.5" fill="#A78BFA"/></svg>
        <svg width="20" height="20" viewBox="0 0 64 64"><rect x="6" y="6" width="52" height="52" rx="14" fill="#6E56F8"/><path d="M24 18H32V40H46V48H24V18Z" fill="#0A0A0F"/><circle cx="41" cy="25" r="4.5" fill="#A78BFA"/></svg>
      </div>
      <div class="name">A — L tile + avatar dot</div>
    </div>

    <!-- B: open loft / roof shape (^ over base) forming abstract L-loft -->
    <div class="card">
      <svg width="80" height="80" viewBox="0 0 64 64" fill="none">
        <rect x="6" y="6" width="52" height="52" rx="14" fill="#14141C" stroke="#26263A" stroke-width="2"/>
        <path d="M16 30L32 16L48 30" stroke="#6E56F8" stroke-width="5" stroke-linecap="round" stroke-linejoin="round"/>
        <rect x="22" y="34" width="20" height="14" rx="3" fill="#6E56F8"/>
        <circle cx="32" cy="41" r="3.5" fill="#A78BFA"/>
      </svg>
      <div class="sizes">
        <svg width="32" height="32" viewBox="0 0 64 64"><rect x="6" y="6" width="52" height="52" rx="14" fill="#14141C" stroke="#26263A" stroke-width="2"/><path d="M16 30L32 16L48 30" stroke="#6E56F8" stroke-width="5" stroke-linecap="round" stroke-linejoin="round"/><rect x="22" y="34" width="20" height="14" rx="3" fill="#6E56F8"/><circle cx="32" cy="41" r="3.5" fill="#A78BFA"/></svg>
        <svg width="20" height="20" viewBox="0 0 64 64"><rect x="6" y="6" width="52" height="52" rx="14" fill="#14141C" stroke="#26263A" stroke-width="2"/><path d="M16 30L32 16L48 30" stroke="#6E56F8" stroke-width="5" stroke-linecap="round" stroke-linejoin="round"/><rect x="22" y="34" width="20" height="14" rx="3" fill="#6E56F8"/><circle cx="32" cy="41" r="3.5" fill="#A78BFA"/></svg>
      </div>
      <div class="name">B — loft roof + room + you</div>
    </div>

    <!-- C: bold geometric L, gradient, minimal -->
    <div class="card">
      <svg width="80" height="80" viewBox="0 0 64 64" fill="none">
        <defs><linearGradient id="g" x1="0" y1="0" x2="64" y2="64">
          <stop offset="0" stop-color="#8B6FFF"/><stop offset="1" stop-color="#5B43E0"/>
        </linearGradient></defs>
        <rect x="6" y="6" width="52" height="52" rx="16" fill="url(#g)"/>
        <path d="M26 18H34V38H46V46H26V18Z" fill="#fff"/>
      </svg>
      <div class="sizes">
        <svg width="32" height="32" viewBox="0 0 64 64"><rect x="6" y="6" width="52" height="52" rx="16" fill="url(#g)"/><path d="M26 18H34V38H46V46H26V18Z" fill="#fff"/></svg>
        <svg width="20" height="20" viewBox="0 0 64 64"><rect x="6" y="6" width="52" height="52" rx="16" fill="url(#g)"/><path d="M26 18H34V38H46V46H26V18Z" fill="#fff"/></svg>
      </div>
      <div class="name">C — bold gradient L</div>
    </div>
  </div>

  <h1 style="margin-top:50px;font-size:16px">lockup (mark + wordmark)</h1>
  <div class="lockup" style="margin-top:18px">
    <svg width="36" height="36" viewBox="0 0 64 64"><rect x="6" y="6" width="52" height="52" rx="14" fill="#6E56F8"/><path d="M24 18H32V40H46V48H24V18Z" fill="#0A0A0F"/><circle cx="41" cy="25" r="4.5" fill="#A78BFA"/></svg>
    <span>loft</span>
  </div>
</body>
</html>
