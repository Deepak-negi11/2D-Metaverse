<svg width="64" height="64" viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Loft mark: a top-down room tile with an L carved out + an avatar dot.
       Reads as "L" + "a space you're inside". -->
  <rect x="6" y="6" width="52" height="52" rx="14" fill="#6E56F8"/>
  <!-- L shape in negative space -->
  <path d="M24 18H32V40H46V48H24V18Z" fill="#0A0A0F"/>
  <!-- avatar dot sitting in the loft -->
  <circle cx="41" cy="25" r="4.5" fill="#A78BFA"/>
</svg>
